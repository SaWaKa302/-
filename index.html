<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>アニメ聖地マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root{--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--border:#e0e0e0;--border2:#ccc;--text:#111;--text2:#555;--text3:#999;--blue:#378ADD;--blue-light:#E6F1FB;--green:#1D9E75;--green-light:#E1F5EE;--r-sm:8px;--r-md:12px;--r-lg:16px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#1a1a2e;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;}
.phone-frame{width:390px;height:844px;position:relative;border-radius:44px;overflow:hidden;box-shadow:0 0 0 10px #2a2a3e,0 0 0 12px #3a3a5e,0 30px 80px rgba(0,0,0,.6);flex-shrink:0;}
@media(max-width:430px){html,body{background:#fff;display:block;height:100%;}.phone-frame{width:100%;height:100dvh;border-radius:0;box-shadow:none;}}
#app{display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden;background:#f0f0f0;}
#map{flex:1;width:100%;z-index:0;}
.top-ui{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 12px 0;display:flex;flex-direction:column;gap:6px;}
.search-row{display:flex;gap:6px;align-items:center;}
.search-pill{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border:0.5px solid var(--border);border-radius:99px;padding:10px 14px;box-shadow:0 1px 6px rgba(0,0,0,.12);}
.search-pill i{font-size:17px;color:var(--text3);flex-shrink:0;}
.search-pill input{border:none;background:none;font-size:14px;color:var(--text);outline:none;width:100%;}
.search-pill input::placeholder{color:var(--text3);}
.anime-pill-wrap{position:relative;flex:1;}
.anime-pill{width:100%;display:flex;align-items:center;gap:7px;background:var(--bg);border:0.5px solid var(--border);border-radius:99px;padding:10px 14px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.12);}
.anime-pill i{font-size:17px;color:var(--text3);flex-shrink:0;}
.anime-pill-label{font-size:14px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.anime-pill-label.chosen{color:var(--text);}
.anime-pill .chev{font-size:15px;margin-left:auto;flex-shrink:0;transition:transform .2s;}
.anime-pill.open .chev{transform:rotate(180deg);}
.anime-dd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);z-index:100;max-height:260px;overflow-y:auto;display:none;box-shadow:0 4px 20px rgba(0,0,0,.14);}
.anime-dd.open{display:block;}
.dd-search-row{padding:10px;border-bottom:0.5px solid var(--border);}
.dd-search-row input{width:100%;font-size:14px;padding:8px 12px;border-radius:var(--r-sm);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);outline:none;}
.dd-all{padding:13px 14px;font-size:14px;color:var(--text2);cursor:pointer;border-bottom:0.5px solid var(--border);}
.dd-all:active,.dd-all:hover{background:var(--bg2);}
.dd-item{padding:13px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);border-bottom:0.5px solid var(--border);}
.dd-item:last-child{border-bottom:none;}
.dd-item:active,.dd-item:hover,.dd-item.sel{background:var(--bg2);}
.dd-item.sel{font-weight:500;}
.dd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dd-cnt{margin-left:auto;font-size:13px;color:var(--text3);}
.icon-btn{width:46px;height:46px;border-radius:50%;background:var(--bg);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:22px;color:var(--text2);box-shadow:0 1px 6px rgba(0,0,0,.12);}
.icon-btn.active{color:var(--blue);border-color:var(--blue);}
.pil-banner{display:none;align-items:center;gap:8px;background:var(--green);border-radius:var(--r-lg);padding:10px 14px;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.pil-banner.visible{display:flex;}
.pil-banner-text{color:#fff;font-size:13px;font-weight:500;flex:1;line-height:1.4;}
.pil-exit-btn{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:13px;padding:6px 12px;border-radius:99px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.loc-banner{position:absolute;bottom:70px;left:12px;right:12px;z-index:20;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:11px 14px;font-size:13px;color:var(--text2);display:none;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.loc-banner i{font-size:19px;color:var(--blue);}
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:9999;background:rgba(0,0,0,.80);color:#fff;font-size:15px;font-weight:500;padding:13px 24px;border-radius:99px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;z-index:10;background:var(--bg);border-radius:18px 18px 0 0;border-top:0.5px solid var(--border);box-shadow:0 -2px 14px rgba(0,0,0,.10);transition:transform .3s cubic-bezier(.32,1,.4,1);touch-action:none;}
.sheet-handle-row{padding:10px 0 4px;display:flex;justify-content:center;cursor:pointer;}
.sheet-handle{width:38px;height:4px;border-radius:99px;background:var(--border2);}
.sheet-header{padding:2px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sheet-title{font-size:15px;font-weight:600;color:var(--text);flex:1;}
.sheet-count{font-size:13px;color:var(--text3);white-space:nowrap;}
.pil-start-btn{display:flex;align-items:center;gap:5px;padding:8px 16px;border-radius:99px;background:var(--green);color:#fff;font-size:14px;font-weight:500;cursor:pointer;border:none;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.pil-start-btn:disabled{background:var(--border2);cursor:default;}
.sheet-content{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sheet-content.collapsed{display:none;}
.near-item{padding:13px 16px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--bg);}
.near-item:active,.near-item:hover{background:var(--bg2);}
.near-left{flex:1;min-width:0;}
.near-anime{font-size:12px;color:var(--text3);margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.near-place{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.near-ep{font-size:12px;color:var(--text2);margin-top:2px;}
.near-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.dist-badge{font-size:12px;font-weight:500;padding:3px 9px;border-radius:99px;background:var(--bg2);color:var(--text2);white-space:nowrap;}
.dist-badge.near{background:#E1F5EE;color:#0F6E56;}
.detail-btn-sm{display:flex;align-items:center;gap:4px;font-size:12px;padding:5px 10px;border-radius:99px;border:0.5px solid var(--border);color:var(--text2);background:var(--bg2);}
.order-badge{width:30px;height:30px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text3);background:var(--bg);flex-shrink:0;}
.order-badge.assigned{color:#fff;border-color:transparent;}
.pil-hud{position:absolute;bottom:0;left:0;right:0;z-index:15;display:none;pointer-events:none;}
.pil-hud.visible{display:block;}
.pil-next-card{background:var(--bg);border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:0 -2px 14px rgba(0,0,0,.12);padding:14px 16px 10px;pointer-events:all;}
.pil-next-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.pil-next-place{font-size:17px;font-weight:700;color:var(--text);margin-bottom:3px;}
.pil-next-meta{font-size:12px;color:var(--text2);margin-bottom:10px;display:flex;gap:12px;}
.pil-next-actions{display:flex;gap:8px;}
.pil-nav-big{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:var(--r-md);background:var(--blue);color:#fff;font-size:14px;font-weight:500;text-decoration:none;}
.pil-arrived-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:var(--r-md);background:var(--green-light);border:1.5px solid var(--green);color:var(--green);font-size:14px;font-weight:500;cursor:pointer;}
.pil-progress{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.pil-progress-bar{flex:1;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.pil-progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s;}
.pil-progress-text{font-size:12px;color:var(--text3);white-space:nowrap;}
.pil-item{padding:13px 16px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);cursor:pointer;}
.pil-item:active,.pil-item:hover{background:var(--bg2);}
.pil-item.done{background:#f0faf6;}
.pil-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.pil-info{flex:1;min-width:0;}
.pil-place{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pil-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.pil-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.pil-done-badge{font-size:11px;padding:3px 9px;border-radius:99px;background:#E1F5EE;color:#0F6E56;font-weight:500;}
.pil-nav-btn{font-size:12px;padding:6px 10px;border-radius:99px;background:var(--blue-light);border:0.5px solid #B5D4F4;color:#185FA5;text-decoration:none;white-space:nowrap;display:flex;align-items:center;gap:3px;}
.detail-overlay{position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.42);display:none;}
.detail-overlay.open{display:block;}
.detail-sheet{position:absolute;bottom:0;left:0;right:0;z-index:40;background:var(--bg);border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.4,1);max-height:90%;display:flex;flex-direction:column;box-shadow:0 -4px 28px rgba(0,0,0,.16);}
.detail-sheet.open{transform:translateY(0);}
.detail-handle-row{padding:10px 0 4px;display:flex;justify-content:center;flex-shrink:0;}
.detail-handle{width:38px;height:4px;border-radius:99px;background:var(--border2);}
.detail-scroll{overflow-y:auto;flex:1;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.detail-hero-ph{width:100%;height:150px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--text3);font-size:13px;}
.detail-hero-ph i{font-size:30px;}
.detail-body{padding:16px 16px 0;}
.d-anime-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.d-anime-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.d-anime-name{font-size:12px;color:var(--text3);}
.d-place{font-size:21px;font-weight:600;color:var(--text);margin-bottom:3px;}
.d-ep{font-size:13px;color:var(--text2);margin-bottom:12px;}
.dsec{margin-bottom:16px;}
.dsec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.dsec-desc{font-size:14px;color:var(--text);line-height:1.75;}
.dsec-row2{display:flex;gap:8px;margin-bottom:16px;}
.dsec-row2 .dsec-access{flex:1;margin-bottom:0;}
.dsec-access{font-size:14px;color:var(--text);background:var(--bg2);border-radius:var(--r-sm);padding:11px 13px;display:flex;align-items:flex-start;gap:8px;line-height:1.6;}
.dsec-access i{font-size:18px;color:var(--text3);flex-shrink:0;margin-top:2px;}
.time-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 14px;border-radius:var(--r-sm);background:#FFF8E7;border:0.5px solid #F0D080;flex-shrink:0;min-width:72px;}
.time-badge-label{font-size:10px;color:#B8960A;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.time-badge-val{font-size:15px;font-weight:700;color:#8A6800;}
.memo-area{width:100%;font-size:14px;color:var(--text);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;resize:none;outline:none;line-height:1.6;font-family:inherit;min-height:80px;}
.memo-area::placeholder{color:var(--text3);}
.memo-save-btn{margin-top:7px;font-size:14px;padding:8px 18px;border-radius:99px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2);cursor:pointer;}
.memo-save-btn.saved{background:#E1F5EE;color:#0F6E56;border-color:#0F6E56;}
/* フィードバック */
.fb-section{margin-bottom:16px;}
.fb-stars{display:flex;gap:6px;margin-bottom:10px;}
.fb-star{font-size:28px;cursor:pointer;color:var(--border2);transition:color .1s;line-height:1;}
.fb-star.on{color:#F5C518;}
.fb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.fb-tag{font-size:12px;padding:5px 10px;border-radius:99px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;}
.fb-tag.on-good{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;font-weight:500;}
.fb-tag.on-bad{background:#FEE9E9;border-color:#E24B4A;color:#C0392B;font-weight:500;}
.fb-send-btn{width:100%;padding:11px;border-radius:var(--r-lg);background:#5865F2;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.fb-send-btn:disabled{background:var(--border2);cursor:default;}
.fb-sent{text-align:center;font-size:13px;color:var(--green);padding:8px 0;}
.nav-row{padding:10px 16px 20px;flex-shrink:0;background:var(--bg);}
.nav-row-inner{display:flex;gap:8px;}
.nav-big-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:var(--r-lg);background:var(--blue);color:#fff;font-size:15px;font-weight:500;text-decoration:none;}
.arrived-from-detail{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:15px;border-radius:var(--r-lg);background:var(--green-light);border:1.5px solid var(--green);color:var(--green);font-size:15px;font-weight:500;cursor:pointer;}
.detail-close{position:absolute;top:18px;right:16px;width:34px;height:34px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text2);z-index:1;}
.empty-sheet{padding:28px 16px;text-align:center;color:var(--text3);font-size:14px;background:var(--bg);}
/* ウィザードモーダル */
.wizard-modal-overlay{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;}
.wizard-modal-overlay.open{display:flex;}
.wizard-modal{width:100%;background:var(--bg);border-radius:22px 22px 0 0;padding:0 0 24px;box-shadow:0 -4px 28px rgba(0,0,0,.18);max-height:85%;display:flex;flex-direction:column;}
.wizard-modal-handle-row{padding:10px 0 4px;display:flex;justify-content:center;flex-shrink:0;}
.wizard-modal-handle{width:38px;height:4px;border-radius:99px;background:var(--border2);}
.wizard-modal-header{padding:4px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:0.5px solid var(--border);}
.wizard-modal-title{font-size:15px;font-weight:700;color:var(--text);}
.wizard-modal-close{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);}
.wizard-modal-body{overflow-y:auto;flex:1;padding:16px;}
/* 巡礼ウィザード */
.wizard-wrap{padding:12px 16px;}
.wizard-step{display:none;}
.wizard-step.active{display:block;}
.wizard-q{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.wizard-sub{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.5;}
.wizard-choices{display:flex;flex-direction:column;gap:8px;}
.wizard-btn{width:100%;padding:12px 14px;border-radius:var(--r-lg);border:1.5px solid var(--border);background:var(--bg);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;}
.wizard-btn:hover{border-color:#1a1a2e;background:#f8f8ff;}
.wizard-btn .wbtn-icon{font-size:20px;flex-shrink:0;}
.wizard-btn .wbtn-text{flex:1;}
.wizard-btn .wbtn-desc{font-size:11px;color:var(--text3);font-weight:400;display:block;margin-top:1px;}
.wizard-back{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:8px 0 4px;display:flex;align-items:center;gap:4px;}
.wizard-result{}
.wizard-result-comment{font-size:13px;color:var(--text2);background:#F0F4FF;border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;line-height:1.6;}
.wizard-result-comment b{color:#2855A0;}
.wizard-result-comment .dist-warn{display:block;margin-top:5px;}
.wizard-day-block{margin-bottom:14px;}
.wizard-day-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding-bottom:4px;border-bottom:0.5px solid var(--border);}
.wizard-route{display:flex;flex-direction:column;}
.wizard-stop{display:flex;align-items:flex-start;gap:10px;padding:7px 0;}
.wizard-stop:not(:last-child){border-bottom:0.5px solid var(--border);}
.wizard-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px;}
.wizard-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.wizard-connector{width:2px;flex:1;min-height:10px;background:var(--border2);margin-top:2px;}
.wizard-stop-info{flex:1;min-width:0;padding-top:3px;}
.wizard-stop-place{font-size:14px;font-weight:500;color:var(--text);}
.wizard-stop-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.wizard-time-chip{font-size:11px;padding:2px 7px;border-radius:99px;background:#FFF8E7;color:#8A6800;border:0.5px solid #F0D080;font-weight:500;}
.wizard-ep-chip{font-size:11px;padding:2px 7px;border-radius:99px;background:var(--bg2);color:var(--text3);}
.wizard-use-btn{width:100%;padding:12px;border-radius:var(--r-lg);background:#1a1a2e;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;margin-top:10px;}
.wizard-restart{width:100%;padding:10px;border-radius:var(--r-lg);background:var(--bg2);color:var(--text2);font-size:13px;border:0.5px solid var(--border);cursor:pointer;margin-top:6px;}
/* 時間帯スライダー */
.time-slider-wrap{margin-bottom:16px;}
.time-slider-labels{display:flex;justify-content:space-between;margin-bottom:6px;}
.time-slider-label{font-size:11px;color:var(--text3);}
.time-slider-track{position:relative;height:36px;display:flex;align-items:center;}
.time-slider-rail{position:absolute;left:0;right:0;height:4px;background:var(--bg3);border-radius:99px;}
.time-slider-range{position:absolute;height:4px;background:#1a1a2e;border-radius:99px;}
.time-slider-thumb{position:absolute;width:24px;height:24px;border-radius:50%;background:#1a1a2e;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.25);cursor:pointer;transform:translateX(-50%);touch-action:none;z-index:2;}
.time-slider-selected{margin-top:8px;text-align:center;font-size:13px;font-weight:600;color:#1a1a2e;}
/* 巡礼モード選択 */
.pil-mode-select{padding:12px 16px;}
.pil-mode-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.pil-mode-cards{display:flex;gap:8px;}
.pil-mode-card{flex:1;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:12px 10px;cursor:pointer;text-align:center;background:var(--bg);transition:all .15s;}
.pil-mode-card:hover{border-color:#1a1a2e;background:#f8f8ff;}
.pil-mode-card.selected{border-color:#1a1a2e;background:#1a1a2e;color:#fff;}
.pil-mode-card.selected .pil-mode-card-icon{color:#fff;}
.pil-mode-card.selected .pil-mode-card-label{color:#fff;}
.pil-mode-card.selected .pil-mode-card-desc{color:rgba(255,255,255,.7);}
.pil-mode-card-icon{font-size:22px;margin-bottom:5px;color:var(--text2);}
.pil-mode-card-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.pil-mode-card-desc{font-size:11px;color:var(--text3);line-height:1.4;}
/* 巡礼のすゝめ */
.susume-section{margin-bottom:16px;}
.susume-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.susume-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.susume-tabs{display:flex;gap:4px;}
.susume-tab{font-size:11px;padding:4px 10px;border-radius:99px;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;}
.susume-tab.active{background:#1a1a2e;color:#fff;border-color:transparent;}
.susume-comment{font-size:13px;color:var(--text2);background:#F0F4FF;border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;line-height:1.6;}
.susume-comment b{color:#2855A0;}
.susume-route{display:flex;flex-direction:column;}
.susume-stop{display:flex;align-items:flex-start;gap:10px;padding:8px 0;}
.susume-stop:not(:last-child){border-bottom:0.5px solid var(--border);}
.susume-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px;}
.susume-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.susume-connector{width:2px;flex:1;min-height:10px;background:var(--border2);margin-top:2px;}
.susume-info{flex:1;min-width:0;padding-top:3px;}
.susume-place{font-size:14px;font-weight:500;color:var(--text);}
.susume-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.susume-time-chip{font-size:11px;padding:2px 7px;border-radius:99px;background:#FFF8E7;color:#8A6800;border:0.5px solid #F0D080;font-weight:500;}
.susume-ep-chip{font-size:11px;padding:2px 7px;border-radius:99px;background:var(--bg2);color:var(--text3);}
.susume-current-badge{font-size:11px;color:var(--blue);}
.susume-empty{padding:14px;text-align:center;font-size:13px;color:var(--text3);}
</style>
</head>
<body>
<div class="phone-frame">
<div id="app">
  <div id="map"></div>
  <div class="toast" id="toast"></div>
  <div class="top-ui">
    <div class="search-row">
      <div class="search-pill"><i class="ti ti-map-pin"></i><input type="text" id="placeSearch" placeholder="場所を検索" oninput="applyFilter()"/></div>
      <div class="anime-pill-wrap" id="animeWrap">
        <div class="anime-pill" id="animePill" onclick="toggleDD(event)">
          <i class="ti ti-movie"></i><span class="anime-pill-label" id="pillLabel">アニメを選択</span><i class="ti ti-chevron-down chev"></i>
        </div>
        <div class="anime-dd" id="animeDD">
          <div class="dd-search-row"><input type="text" id="ddInput" placeholder="アニメ名を検索…" oninput="renderDDItems(this.value)"/></div>
          <div class="dd-all" onclick="selectAnime('')">すべてのアニメ</div>
          <div id="ddItems"></div>
        </div>
      </div>
      <button class="icon-btn" id="locBtn" onclick="getLocation()"><i class="ti ti-current-location"></i></button>
    </div>
    <div id="pilControls" style="display:none;">
      <div class="pil-banner visible" id="pilBanner">
        <span class="pil-banner-text" id="pilBannerText">ピンをタップして順番を設定</span>
        <button class="pil-exit-btn" onclick="exitPilMode()">終了</button>
      </div>
    </div>
  </div>
  <div id="locBanner" class="loc-banner"><i class="ti ti-info-circle"></i><span id="locMsg"></span></div>
  <div class="pil-hud" id="pilHud"><div class="pil-next-card" id="pilNextCard"></div></div>
  <div class="bottom-sheet" id="listSheet">
    <div class="sheet-handle-row" onclick="toggleSheet()"><div class="sheet-handle"></div></div>
    <div class="sheet-header">
      <span class="sheet-title" id="sheetTitle">聖地一覧</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="sheet-count" id="sheetCount">0件</span>
        <button class="pil-start-btn" id="pilStartBtn" onclick="startPilgrimage()" disabled style="display:none;"><i class="ti ti-route"></i>スタート</button>
      </div>
    </div>
    <div class="sheet-content collapsed" id="sheetContent" id="sheetContent" style="max-height:50vh;overflow-y:auto;"></div>
  </div>
  <!-- 巡礼ウィザードモーダル -->
  <div class="wizard-modal-overlay" id="wizardOverlay" onclick="onWizardOverlayClick(event)">
    <div class="wizard-modal" id="wizardModal">
      <div class="wizard-modal-handle-row"><div class="wizard-modal-handle"></div></div>
      <div class="wizard-modal-header">
        <span class="wizard-modal-title">✨ 巡礼のすゝめ</span>
        <button class="wizard-modal-close" onclick="closeWizardModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="wizard-modal-body" id="wizardModalBody"></div>
    </div>
  </div>

  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-sheet" id="detailSheet">
    <button class="detail-close" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    <div class="detail-handle-row"><div class="detail-handle"></div></div>
    <div class="detail-scroll" id="detailScroll"></div>
    <div class="nav-row"><div class="nav-row-inner" id="navRowInner">
      <a class="nav-big-btn" id="detailNavBtn" href="#" target="_blank"><i class="ti ti-navigation"></i>Google Mapsで案内</a>
    </div></div>
  </div>
</div>

function dist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmtDist(m){return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`;}

const TIME_ORDER=['早朝','朝','午前','昼','午後','夕方','夜','終日'];

function sortRoute(spots){
  const base=spots[0];
  return [...spots].sort((a,b)=>{
    const ta=TIME_ORDER.indexOf(a.time||'終日');
    const tb=TIME_ORDER.indexOf(b.time||'終日');
    if(ta!==tb)return ta-tb;
    return dist(base.lat,base.lng,a.lat,a.lng)-dist(base.lat,base.lng,b.lat,b.lng);
  });
}

function calcTotalDist(spots){
  let total=0;
  for(let i=0;i<spots.length-1;i++){
    total+=dist(spots[i].lat,spots[i].lng,spots[i+1].lat,spots[i+1].lng);
  }
  return total;
}

function getDistanceComment(spots){
  if(spots.length<2)return '';
  const totalKm=calcTotalDist(spots)/1000;
  if(totalKm<=30){
    return `<span style="color:#1D9E75;">✓ 合計移動距離 約${totalKm.toFixed(0)}km — 1日で余裕を持って回れます。</span>`;
  } else if(totalKm<=100){
    return `<span style="color:#BA7517;">⚠ 合計移動距離 約${totalKm.toFixed(0)}km — 移動多めですが1日で回れます。体力と交通手段を確認しておきましょう。</span>`;
  } else {
    return `<span style="color:#E24B4A;">⚠ 合計移動距離 約${totalKm.toFixed(0)}km — 距離が長いため複数日に分けることをおすすめします。</span>`;
  }
}

function getRouteComment(spots,mode){
  const times=spots.map(p=>p.time||'終日');
  const nightCount=times.filter(t=>t==='夜').length;
  const eveningCount=times.filter(t=>t==='夕方').length;
  const morningCount=times.filter(t=>t==='早朝'||t==='朝'||t==='午前').length;
  const total=spots.length;
  const distComment=getDistanceComment(spots);
  let routeComment='';
  if(mode==='night'){
    if(nightCount===0)routeComment=`夜スポットはありませんが、<b>夕方から</b>訪れると雰囲気が出るスポットが${eveningCount}か所あります。`;
    else routeComment=`<b>夜スポットが${nightCount}か所</b>あります。夕方から出発して夜に向けて回るのがおすすめです。`;
  } else {
    if(morningCount>=2)routeComment=`<b>午前中スタート</b>がおすすめ。早い時間帯のスポットが${morningCount}か所あり、混雑を避けられます。`;
    else if(nightCount>=2)routeComment=`<b>夕方〜夜にかけて</b>訪れると作品の雰囲気に最も近くなります。昼間に移動して夜に備えましょう。`;
    else routeComment=`全${total}か所を時間帯順に並べています。上から順に回るのが効率的です。`;
  }
  return `${routeComment}<br><small style="margin-top:5px;display:block;">${distComment}</small>`;
}

function renderSusume(p){
  const animeSpots=ALL_PINS.filter(s=>s.anime===p.anime);
  if(animeSpots.length<2)return '';
  const color=getColor(p.anime);
  const allRoute=sortRoute(animeSpots);
  const nightSpots=animeSpots.filter(s=>s.time==='夕方'||s.time==='夜');
  const nightRoute=nightSpots.length>0?sortRoute(nightSpots):[];

  function stopsHTML(spots,currentId){
    if(spots.length===0)return '<div class="susume-empty">該当するスポットがありません</div>';
    return spots.map((s,i)=>{
      const isCurrent=String(s.id)===String(currentId);
      const isLast=i===spots.length-1;
      return `<div class="susume-stop">
        <div class="susume-line">
          <div class="susume-circle" style="background:${isCurrent?'var(--blue)':color}">${i+1}</div>
          ${!isLast?'<div class="susume-connector"></div>':''}
        </div>
        <div class="susume-info">
          <div class="susume-place">${s.place}${isCurrent?' <span class="susume-current-badge">← いまここ</span>':''}</div>
          <div class="susume-meta">
            ${s.time?`<span class="susume-time-chip">${s.time}</span>`:''}
            <span class="susume-ep-chip">${s.episode}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  const allHTML=`<div class="susume-comment">${getRouteComment(allRoute,'1day')}</div><div class="susume-route">${stopsHTML(allRoute,p.id)}</div>`;
  const nightHTML=nightRoute.length>0
    ?`<div class="susume-comment">${getRouteComment(nightRoute,'night')}</div><div class="susume-route">${stopsHTML(nightRoute,p.id)}</div>`
    :`<div class="susume-empty">夕方・夜スポットがありません</div>`;

  const uid=String(p.id).replace('.','');
  return `<div class="susume-section">
    <div class="susume-header">
      <span class="susume-title">巡礼のすゝめ</span>
      <div class="susume-tabs">
        <button class="susume-tab active" onclick="switchTab(this,'all-${uid}','night-${uid}')">1日コース</button>
        <button class="susume-tab" onclick="switchTab(this,'night-${uid}','all-${uid}')">夜コース</button>
      </div>
    </div>
    <div id="all-${uid}">${allHTML}</div>
    <div id="night-${uid}" style="display:none">${nightHTML}</div>
  </div>`;
}

async function sendFeedback(id){
  const m=markers.find(m=>String(m.pin.id)===String(id));

  if(!fb||fb.star===0)return;

  const stars='★'.repeat(fb.star)+'☆'.repeat(5-fb.star);

  const memo=feedbacks[id]?.memo||(document.getElementById(`memoArea_${id}`)?.value||'');

      ...(memo?[{name:'📝 メモ',value:memo,inline:false}]:[]),

  try{

let pilRouteMode = 'suggest'; // 'suggest' | 'manual'
let wizardState = {}; // ウィザードの回答状態

// ── ウィザードロジック ────────────────────────────
function clusterSpots(spots, thresholdKm=60){
  // 距離ベースで近いスポットをグループ化
  const clusters=[];
  const used=new Set();
  spots.forEach((s,i)=>{
    if(used.has(i))return;
    const cluster=[s];used.add(i);
    spots.forEach((t,j)=>{
      if(used.has(j))return;
      if(dist(s.lat,s.lng,t.lat,t.lng)/1000<thresholdKm){cluster.push(t);used.add(j);}
    });
    clusters.push(cluster);
  });
  return clusters;
}

function getAreaLabel(spots){
  // スポット群の代表地名を推定（最初のスポットのaccessから）
  const acc=spots[0].access||'';
  const m=acc.match(/([^\s・]+[都道府県市区町])/);
  if(m)return m[1];
  // アクセス情報がなければ緯度経度で大まかに判定
  const lat=spots[0].lat,lng=spots[0].lng;
  if(lat>36)return '北部エリア';
  if(lng>139.5)return '東部エリア';
  if(lng<136)return '西部エリア';
  return '中部エリア';
}

function buildWizardRoute(spots, multiDay, areaIdx, timeSlot){
  const clusters=clusterSpots(spots);
  if(multiDay){
    return clusters.map(c=>sortRoute(c));
  } else {
    const target = areaIdx!=null ? clusters[areaIdx] : spots;
    if(timeSlot==='range'){
      // スライダーで選んだ範囲でフィルタ
      const filtered = target.filter(s=>{
        const idx = TIME_LABELS.indexOf(s.time);
        if(idx===-1) return true; // time未設定は含める
        return idx >= sliderStart && idx <= sliderEnd;
      });
      const result = filtered.length > 0 ? sortRoute(filtered) : sortRoute(target);
      return [result];
    }
    if(timeSlot==='full') return [sortRoute(target)];
    const base=target[0];
    return [[...target].sort((a,b)=>dist(base.lat,base.lng,a.lat,a.lng)-dist(base.lat,base.lng,b.lat,b.lng))];
  }
}

function wizardRouteHTML(dayRoutes, animeColor){
  return dayRoutes.map((spots,di)=>{
    const totalKm=calcTotalDist(spots)/1000;
    let distWarn='';
    if(totalKm>100)distWarn=`<span class="dist-warn" style="color:#E24B4A;">⚠ この日の移動距離 約${totalKm.toFixed(0)}km — 長距離移動があります</span>`;
    else if(totalKm>30)distWarn=`<span class="dist-warn" style="color:#BA7517;">⚠ この日の移動距離 約${totalKm.toFixed(0)}km</span>`;
    else distWarn=`<span class="dist-warn" style="color:#1D9E75;">✓ この日の移動距離 約${totalKm.toFixed(0)}km</span>`;
    const stopsHTML=spots.map((s,i)=>{
      const isLast=i===spots.length-1;
      return `<div class="wizard-stop">
        <div class="wizard-line">
          <div class="wizard-circle" style="background:${animeColor}">${i+1}</div>
          ${!isLast?'<div class="wizard-connector"></div>':''}
        </div>

      </div>`;
    }).join('');
    return `<div class="wizard-day-block">
      ${dayRoutes.length>1?`<div class="wizard-day-label">${di+1}日目 — ${spots.length}か所</div>`:''}
      <div class="wizard-result-comment">${distWarn}</div>
      <div class="wizard-route">${stopsHTML}</div>
    </div>`;
  }).join('');
}

const TIME_LABELS = ['早朝','朝','午前','昼','午後','夕方','夜'];
let sliderStart = 0, sliderEnd = TIME_LABELS.length - 1;
let dragging = null;

function showWizardQ3(){
  sliderStart = 0;
  sliderEnd = TIME_LABELS.length - 1;
  wizardSetBody(`
    <button class="wizard-back" onclick="startWizard()">← 戻る</button>
    <div class="wizard-q">Q3. 時間帯を選んでください</div>
    <div class="wizard-sub">つまみをドラッグして巡礼する時間帯の範囲を指定してください。</div>
    <div class="time-slider-wrap">
      <div class="time-slider-labels">
        ${TIME_LABELS.map(t=>`<span class="time-slider-label">${t}</span>`).join('')}
      </div>
      <div class="time-slider-track" id="sliderTrack">
        <div class="time-slider-rail"></div>
        <div class="time-slider-range" id="sliderRange"></div>
        <div class="time-slider-thumb" id="thumbStart"></div>
        <div class="time-slider-thumb" id="thumbEnd"></div>
      </div>
      <div class="time-slider-selected" id="sliderSelected"></div>
    </div>
    <button class="wizard-use-btn" style="background:#1a1a2e;margin-top:4px;" onclick="wizardAnswer(3,'range')">このルートを確認する</button>`);
  requestAnimationFrame(initSlider);
}

function initSlider(){
  const track = document.getElementById('sliderTrack');
  if(!track) return;
  updateSliderUI();

  function getPos(e){
    const rect = track.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  }
  function posToIdx(pos){ return Math.round(pos * (TIME_LABELS.length - 1)); }

  function onMove(e){
    if(!dragging) return;
    e.preventDefault();
    const idx = posToIdx(getPos(e));
    if(dragging === 'start'){
      sliderStart = Math.min(idx, sliderEnd);
    } else {
      sliderEnd = Math.max(idx, sliderStart);
    }
    updateSliderUI();
  }
  function onUp(){ dragging = null; }

  document.getElementById('thumbStart').addEventListener('mousedown', e=>{ dragging='start'; e.preventDefault(); });
  document.getElementById('thumbEnd').addEventListener('mousedown', e=>{ dragging='end'; e.preventDefault(); });
  document.getElementById('thumbStart').addEventListener('touchstart', e=>{ dragging='start'; }, {passive:true});
  document.getElementById('thumbEnd').addEventListener('touchstart', e=>{ dragging='end'; }, {passive:true});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}

function updateSliderUI(){
  const n = TIME_LABELS.length - 1;
  const startPct = (sliderStart / n) * 100;
  const endPct = (sliderEnd / n) * 100;
  const ts = document.getElementById('thumbStart');
  const te = document.getElementById('thumbEnd');
  const range = document.getElementById('sliderRange');
  const sel = document.getElementById('sliderSelected');
  if(!ts||!te||!range||!sel) return;
  ts.style.left = startPct + '%';
  te.style.left = endPct + '%';
  range.style.left = startPct + '%';
  range.style.width = (endPct - startPct) + '%';
  const startLabel = TIME_LABELS[sliderStart];
  const endLabel = TIME_LABELS[sliderEnd];
  sel.textContent = startLabel === endLabel ? startLabel : `${startLabel} 〜 ${endLabel}`;
}

function setPilRouteMode(mode){
  pilRouteMode=mode;
  document.querySelectorAll('.pil-mode-card').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll(`.pil-mode-card[data-mode="${mode}"]`).forEach(c=>c.classList.add('selected'));
  renderListSheetBody();
}

function renderListSheetBody(){
  const animePins=pins.filter(p=>p.anime===pilAnime);
  const container=document.getElementById('pilSheetBody');
  if(!container)return;
  if(pilRouteMode==='suggest'){
    // suggestモードはボタンクリックでモーダルを開く
    container.innerHTML=`<div style="padding:16px;">
      <button class="wizard-use-btn" style="background:var(--green);" onclick="openWizardModal()">✨ 巡礼のすゝめを見る</button>
    </div>`;
  } else {
    container.innerHTML=animePins.map(p=>{
      const color=getColor(p.anime),orderNum=pilOrder[p.id];
      return `<div class="near-item" onclick="openDetail('${p.id}')"><div class="order-badge${orderNum?' assigned':''}" style="${orderNum?`background:${color};`:''}">${orderNum||'—'}</div><div class="near-left"><div class="near-place">${p.place}</div><div class="near-ep">${p.episode}</div></div><div class="near-right"><span class="detail-btn-sm"><i class="ti ti-chevron-right"></i>詳細</span></div></div>`;
    }).join('');
  }
}

function renderListSheet(){
  const total=pins.filter(p=>p.anime===pilAnime).length;
  const assigned=Object.keys(pilOrder).length;
  document.getElementById('sheetCount').textContent=`${assigned}/${total}か所`;

  const modeSelect=`<div class="pil-mode-select">
    <div class="pil-mode-title">巡礼スタイルを選ぶ</div>
    <div class="pil-mode-cards">
      <div class="pil-mode-card${pilRouteMode==='suggest'?' selected':''}" data-mode="suggest" onclick="setPilRouteMode('suggest')">
        <div class="pil-mode-card-icon">✨</div>
        <div class="pil-mode-card-label">巡礼のすゝめ</div>
        <div class="pil-mode-card-desc">質問に答えてルートを自動提案</div>
      </div>
      <div class="pil-mode-card${pilRouteMode==='manual'?' selected':''}" data-mode="manual" onclick="setPilRouteMode('manual')">
        <div class="pil-mode-card-icon">🗺️</div>
        <div class="pil-mode-card-label">自分で決める</div>
        <div class="pil-mode-card-desc">ピンをタップして順番を自由に設定</div>
      </div>
    </div>
  </div>

function exitPilMode(){
  pilMode=false;pilActive=false;pilAnime='';pilOrder={};pilDone={};pilNextOrder=1;
  if(pilRouteLayer){map.removeLayer(pilRouteLayer);pilRouteLayer=null;}
  document.getElementById('pilControls').style.display='none';document.getElementById('pilHud').classList.remove('visible');
  document.getElementById('pilStartBtn').style.display='none';document.getElementById('sheetTitle').textContent='聖地一覧';
  document.getElementById('listSheet').classList.remove('pil-active');
  document.getElementById('listSheet').style.bottom='0';
  document.getElementById('sheetContent').style.maxHeight='240px';
  selectedAnime='';document.getElementById('pillLabel').textContent='アニメを選択';document.getElementById('pillLabel').classList.remove('chosen');
  closeDetail();refreshMarkers();applyFilter();
}

function toggleDD(e){
  if(pilMode)return;e.stopPropagation();ddOpen=!ddOpen;
  document.getElementById('animePill').classList.toggle('open',ddOpen);document.getElementById('animeDD').classList.toggle('open',ddOpen);
  if(ddOpen){document.getElementById('ddInput').value='';renderDDItems('');setTimeout(()=>document.getElementById('ddInput').focus(),50);}
}
function renderDDItems(q){
  const all=[...new Set(pins.map(p=>p.anime))];const f=q?all.filter(a=>a.toLowerCase().includes(q.toLowerCase())):all;
  const el=document.getElementById('ddItems');
  if(!f.length){el.innerHTML=`<div style="padding:12px;font-size:14px;color:#999;text-align:center;">見つかりません</div>`;return;}
  el.innerHTML=f.map(a=>{const color=getColor(a),cnt=pins.filter(p=>p.anime===a).length;return `<div class="dd-item${a===selectedAnime?' sel':''}" onclick="onAnimeSelect('${a.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"><span class="dd-dot" style="background:${color}"></span><span style="flex:1">${a}</span><span class="dd-cnt">${cnt}</span></div>`;}).join('');
}
function onAnimeSelect(anime){document.getElementById('animePill').classList.remove('open');document.getElementById('animeDD').classList.remove('open');ddOpen=false;enterAssignMode(anime);}
function selectAnime(anime){selectedAnime=anime;document.getElementById('pillLabel').textContent=anime||'アニメを選択';document.getElementById('pillLabel').classList.toggle('chosen',!!anime);document.getElementById('animePill').classList.remove('open');document.getElementById('animeDD').classList.remove('open');ddOpen=false;applyFilter();}

function applyFilter(){
  if(pilMode)return;
  const placeQ=document.getElementById('placeSearch').value.toLowerCase();
  let filtered=pins.filter(p=>(!selectedAnime||p.anime===selectedAnime)&&(!placeQ||p.place.toLowerCase().includes(placeQ)||p.anime.toLowerCase().includes(placeQ)));
  if(userLat!==null)filtered=filtered.map(p=>({...p,_dist:dist(userLat,userLng,p.lat,p.lng)})).sort((a,b)=>a._dist-b._dist);
  markers.forEach(({pin,marker})=>{const show=!!filtered.find(f=>f.id===pin.id);if(show)map.addLayer(marker);else map.removeLayer(marker);marker.setIcon(makeIcon(getColor(pin.anime),null,false));});
  document.getElementById('sheetTitle').textContent=userLat!==null?'近くの聖地':'聖地一覧';document.getElementById('sheetCount').textContent=`${filtered.length}件`;
  const content=document.getElementById('sheetContent');
  if(!filtered.length){content.innerHTML=`<div class="empty-sheet">該当する聖地が見つかりません</div>`;return;}
  content.innerHTML=filtered.map(p=>{const color=getColor(p.anime),d=p._dist,isNear=d!==undefined&&d<3000;return `<div class="near-item" onclick="openDetail('${p.id}')"><div class="near-left"><div class="near-anime"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0;"></span>${p.anime}</div><div class="near-place">${p.place}</div><div class="near-ep">${p.episode}</div></div><div class="near-right">${d!==undefined?`<span class="dist-badge${isNear?' near':''}">${isNear?'★ ':''}${fmtDist(d)}</span>`:''}<span class="detail-btn-sm"><i class="ti ti-chevron-right"></i>詳細</span></div></div>`;}).join('');
}

// ── ボトムシート スワイプ制御 ─────────────────────────
(function(){
  let startY=0, startH=0, isDragging=false;
  const SNAP_OPEN=160, SNAP_CLOSE=60;
  // 3段階の高さ（collapsed / half / full）
  const HEIGHTS={ collapsed:0, half:220, full:Math.round(window.innerHeight*0.65) };
  let currentSnap='collapsed';

  function getSheet(){ return document.getElementById('listSheet'); }
  function getContent(){ return document.getElementById('sheetContent'); }

  function applyHeight(h, animate){
    const sheet=getSheet(), content=getContent();
    if(!sheet||!content) return;
    if(animate) sheet.style.transition='transform .3s cubic-bezier(.32,1,.4,1)';
    else sheet.style.transition='none';
    content.style.maxHeight = h + 'px';
    content.style.overflow = 'auto';
    if(h===0){
      content.classList.add('collapsed');
      sheetOpen=false;
    } else {
      content.classList.remove('collapsed');
      sheetOpen=true;
    }
  }

  function snapTo(snap, animate=true){
    currentSnap=snap;
    applyHeight(HEIGHTS[snap], animate);
  }

  function onHandleDown(e){
    isDragging=true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startH = HEIGHTS[currentSnap];
    getSheet().style.transition='none';
    e.preventDefault();
  }

  function onMove(e){
    if(!isDragging) return;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = startY - clientY; // 上方向が正
    const newH = Math.max(0, Math.min(HEIGHTS.full, startH + dy));
    applyHeight(newH, false);
    e.preventDefault();
  }

  function onUp(e){
    if(!isDragging) return;
    isDragging=false;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const dy = startY - clientY;
    const curH = HEIGHTS[currentSnap];
    // スナップ判定
    if(dy > SNAP_OPEN){
      // 大きく上スワイプ → full or half
      snapTo(currentSnap==='full'?'full':currentSnap==='half'?'full':'half');
    } else if(dy < -SNAP_CLOSE){
      // 下スワイプ → half or collapsed
      snapTo(currentSnap==='full'?'half':currentSnap==='half'?'collapsed':'collapsed');
    } else {
      // 元に戻す
      snapTo(currentSnap);
    }
  }

  window.addEventListener('DOMContentLoaded', ()=>{
    const handleRow = document.querySelector('.sheet-handle-row');
    if(!handleRow) return;
    handleRow.addEventListener('touchstart', onHandleDown, {passive:false});
    handleRow.addEventListener('mousedown', onHandleDown);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchend', onUp);
    document.addEventListener('mouseup', onUp);
  });
})();

function toggleSheet(){
  // ハンドルタップで3段階切り替え
  const snaps=['collapsed','half','full'];
  const cur=document.getElementById('sheetContent').classList.contains('collapsed')?'collapsed':
    parseInt(document.getElementById('sheetContent').style.maxHeight||0)<300?'half':'full';
  const next=cur==='collapsed'?'half':cur==='half'?'full':'collapsed';
  sheetOpen=next!=='collapsed';
  const content=document.getElementById('sheetContent');
  const HEIGHTS={collapsed:0,half:220,full:Math.round(window.innerHeight*0.65)};
  content.style.maxHeight=HEIGHTS[next]+'px';
  content.style.overflow='auto';
  if(next==='collapsed') content.classList.add('collapsed');
  else content.classList.remove('collapsed');
}

map.fitBounds(group.getBounds().pad(0.08));
